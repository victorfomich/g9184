<!DOCTYPE html>
<!--
  Панель: CRUD результатов через /api (Supabase на проде). Локально: npm start.
-->
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DET — управление</title>
  <style>
    :root {
      --bg: #000000;
      --line: #333333;
      --text: #e8e8e8;
      --muted: #888888;
      --accent: #cfcfcf;
    }
    * {
      box-sizing: border-box;
    }
    body.det-panel {
      margin: 0;
      font-family: ui-monospace, "Cascadia Code", "Source Code Pro", Menlo, Consolas, monospace;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      line-height: 1.4;
      padding: 16px 18px 40px;
      -webkit-user-select: text;
      user-select: text;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .sub {
      color: var(--muted);
      font-size: 12px;
      margin: 0 0 20px;
      max-width: 720px;
    }
    .sub code {
      background: #111;
      border: 1px solid var(--line);
      padding: 1px 5px;
      font-size: 11px;
    }
    .layout {
      display: grid;
      gap: 16px;
      max-width: 1200px;
      margin: 0 auto;
    }
    @media (min-width: 900px) {
      .layout {
        grid-template-columns: 1fr 1fr;
        align-items: start;
      }
    }
    .card {
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 14px 14px 16px;
    }
    .card h2 {
      margin: 0 0 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--line);
      padding-bottom: 8px;
    }
    .section-label {
      margin: 14px 0 8px;
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
    label {
      display: block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 4px;
    }
    .row {
      display: grid;
      gap: 10px;
      margin-bottom: 10px;
    }
    @media (min-width: 500px) {
      .row.cols-2 {
        grid-template-columns: 1fr 1fr;
      }
    }
    input[type="text"],
    input[type="number"],
    input[type="file"],
    textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 0;
      font-family: inherit;
      font-size: 13px;
      background: #000;
      color: var(--text);
    }
    input::file-selector-button {
      font-family: inherit;
      font-size: 11px;
      background: #111;
      color: var(--text);
      border: 1px solid var(--line);
      padding: 4px 8px;
      margin-right: 8px;
      cursor: pointer;
    }
    input:focus,
    textarea:focus {
      outline: 1px solid #666;
      border-color: #666;
    }
    textarea {
      min-height: 72px;
      resize: vertical;
    }
    textarea.readonly-json {
      min-height: 100px;
      margin-top: 6px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
    }
    button {
      font-family: inherit;
      cursor: pointer;
      border-radius: 0;
      padding: 8px 14px;
      font-weight: 600;
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      border: 1px solid var(--line);
      background: #0a0a0a;
      color: var(--text);
    }
    button:hover {
      background: #141414;
    }
    .btn-primary {
      background: #111;
      border-color: #555;
      color: #fff;
    }
    .btn-secondary {
      background: #000;
    }
    .btn-danger {
      background: #1a0a0a;
      border-color: #522;
      color: #e88;
    }
    .btn-small {
      padding: 5px 8px;
      font-size: 10px;
    }
    .row-actions-end {
      display: flex;
      align-items: flex-end;
    }
    .photo-preview {
      width: 120px;
      height: 120px;
      border-radius: 0;
      object-fit: cover;
      border: 1px solid var(--line);
      display: block;
      margin-top: 8px;
    }
    .result-item {
      border: 1px solid var(--line);
      border-radius: 0;
      padding: 10px;
      margin-bottom: 10px;
      background: #000;
    }
    .result-item:last-child {
      margin-bottom: 0;
    }
    .result-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--accent);
    }
    .result-item .meta-id {
      font-size: 11px;
      color: var(--muted);
    }
    .result-item .links {
      font-size: 11px;
      word-break: break-all;
      color: var(--muted);
      margin: 8px 0;
    }
    .result-item .links a {
      color: #9cf;
    }
    .empty {
      color: var(--muted);
      font-size: 12px;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      border: 1px solid var(--line);
      color: var(--text);
      padding: 10px 16px;
      border-radius: 0;
      font-size: 12px;
      z-index: 1000;
    }
    .top-links {
      margin-bottom: 16px;
      font-size: 12px;
    }
    .top-links a {
      color: #9cf;
      text-decoration: none;
    }
    .top-links a:hover {
      text-decoration: underline;
    }
    .import-block {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--line);
    }
    .import-block .actions + label {
      margin-top: 12px;
    }

    #admin-login.admin-login-overlay {
      position: fixed;
      inset: 0;
      z-index: 99999;
      background: #000;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .admin-login-box {
      border: 1px solid var(--line);
      padding: 24px 28px;
      max-width: 360px;
      width: 100%;
    }
    .admin-login-title {
      margin: 0 0 16px;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
    }
    #admin-pin {
      letter-spacing: 0.25em;
      font-size: 16px;
    }
    .admin-login-err {
      color: #e88;
      font-size: 12px;
      margin: 8px 0 0;
    }
    #admin-main {
      display: none !important;
    }
    #admin-login {
      display: none;
    }
    html:not(.js-admin-auth-ok) #admin-login.admin-login-overlay {
      display: flex !important;
    }
    html:not(.js-admin-auth-ok) #admin-main {
      display: none !important;
    }
    html.js-admin-auth-ok #admin-login {
      display: none !important;
    }
    html.js-admin-auth-ok #admin-main {
      display: block !important;
    }
  </style>
  <script>
    (function () {
      try {
        var j = sessionStorage.getItem("det_admin_v1");
        if (!j) return;
        var o = JSON.parse(j);
        if (Date.now() - o.last < 30 * 60 * 1000) {
          document.documentElement.classList.add("js-admin-auth-ok");
        }
      } catch (e) {}
    })();
  </script>
</head>
<body class="det-panel">
  <div id="admin-login" class="admin-login-overlay">
    <div class="admin-login-box">
      <p class="admin-login-title">Вход</p>
      <form id="admin-login-form" autocomplete="off">
        <label for="admin-pin">PIN (4 цифры)</label>
        <input
          type="password"
          id="admin-pin"
          name="admin-pin"
          maxlength="4"
          inputmode="numeric"
          pattern="[0-9]*"
          autocomplete="off"
          autocorrect="off"
          spellcheck="false"
        />
        <p id="admin-login-err" class="admin-login-err" hidden></p>
        <div class="actions" style="margin-top: 14px">
          <button type="submit" class="btn-primary">Войти</button>
        </div>
      </form>
    </div>
  </div>

  <div id="admin-main">
  <div class="top-links">
    <a href="/">← главная</a>
    ·
    <a href="/certificate">сертификат</a>
  </div>
  <h1>DET — записи</h1>
  <p class="sub">
    Ключи в <code>lib/supabase-config.js</code> → Supabase; иначе <code>npm start</code> и файл
    <code>data/results.json</code>; без API — только браузер. Публичные страницы:
    <code>/</code>, <code>/certificate</code> с <code>?r=…</code>.
  </p>

  <div class="layout">
    <div class="card">
      <h2 id="form-title">Новый результат</h2>
      <form id="result-form">
        <input type="hidden" id="edit-id" value="" />

        <div class="row cols-2">
          <div>
            <label for="lastName">Фамилия</label>
            <input type="text" id="lastName" required placeholder="Ivanov" />
          </div>
          <div>
            <label for="firstName">Имя</label>
            <input type="text" id="firstName" required placeholder="Ivan" />
          </div>
        </div>

        <div class="row">
          <label for="displayName">Как показать имя (необязательно)</label>
          <input
            type="text"
            id="displayName"
            placeholder="Ivanov, Ivan — если пусто, соберётся из фамилии и имени"
          />
        </div>

        <div class="row cols-2">
          <div>
            <label for="dob">Дата рождения (текст)</label>
            <input type="text" id="dob" placeholder="August 24, 1982" />
          </div>
          <div>
            <label for="examDate">Дата экзамена (на score / cert)</label>
            <input type="text" id="examDate" placeholder="2025-11-28" />
          </div>
        </div>

        <div class="row">
          <label for="photo">Фото</label>
          <input type="file" id="photo" accept="image/*" />
          <img class="photo-preview" id="photo-preview" alt="" style="display: none" />
        </div>

        <div class="row cols-2">
          <div>
            <label for="overall">Overall (10–160)</label>
            <input type="number" id="overall" min="10" max="160" value="140" />
          </div>
          <div>
            <label for="cefrLabel">Уровень (заголовок у сертификата)</label>
            <input type="text" id="cefrLabel" value="Proficient: CEFR C2" />
          </div>
        </div>

        <p class="section-label">Individual</p>
        <div class="row cols-2">
          <div><label for="speaking">Speaking</label><input type="number" id="speaking" min="10" max="160" value="135" /></div>
          <div><label for="writing">Writing</label><input type="number" id="writing" min="10" max="160" value="135" /></div>
        </div>
        <div class="row cols-2">
          <div><label for="reading">Reading</label><input type="number" id="reading" min="10" max="160" value="140" /></div>
          <div><label for="listening">Listening</label><input type="number" id="listening" min="10" max="160" value="140" /></div>
        </div>

        <p class="section-label">Integrated</p>
        <div class="row cols-2">
          <div><label for="production">Production</label><input type="number" id="production" min="10" max="160" value="135" /></div>
          <div><label for="literacy">Literacy</label><input type="number" id="literacy" min="10" max="160" value="140" /></div>
        </div>
        <div class="row cols-2">
          <div><label for="comprehension">Comprehension</label><input type="number" id="comprehension" min="10" max="160" value="140" /></div>
          <div><label for="conversation">Conversation</label><input type="number" id="conversation" min="10" max="160" value="140" /></div>
        </div>

        <div class="row cols-2">
          <div>
            <label for="certificateId">Certificate ID</label>
            <input type="text" id="certificateId" placeholder="ww9u9ff03bcr5mu1" />
          </div>
          <div class="row-actions-end">
            <button type="button" class="btn-secondary" id="btn-random-id">Случайный ID</button>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn-primary" id="btn-save">Сохранить</button>
          <button type="button" class="btn-secondary" id="btn-new">Новый (сброс формы)</button>
        </div>
      </form>
    </div>

    <div class="card">
      <h2>Сохранённые результаты</h2>
      <div id="list"></div>
      <div class="import-block">
        <label for="export-data">Резервная копия (JSON)</label>
        <textarea id="export-data" class="readonly-json" readonly></textarea>
        <div class="actions">
          <button type="button" class="btn-secondary" id="btn-copy-json">Копировать JSON</button>
          <button type="button" class="btn-secondary" id="btn-import">Импорт из поля ниже</button>
        </div>
        <label for="import-field">Вставить JSON для импорта</label>
        <textarea id="import-field" placeholder='{"results":{...}}'></textarea>
      </div>
    </div>
  </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/results-store.js"></script>
  <script src="js/apply-pages.js"></script>
  <script src="js/admin-auth.js"></script>
  <script>
    function toast(msg) {
      var t = document.createElement("div");
      t.className = "toast";
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(function () {
        t.remove();
      }, 2500);
    }

    function pageUrl(file, id) {
      return DET_pages.pageUrl(file, id);
    }

    function formToResult() {
      var lastName = document.getElementById("lastName").value.trim();
      var firstName = document.getElementById("firstName").value.trim();
      var displayName = document.getElementById("displayName").value.trim();
      return {
        id: document.getElementById("edit-id").value || undefined,
        lastName: lastName,
        firstName: firstName,
        displayName: displayName || undefined,
        dob: document.getElementById("dob").value.trim(),
        examDate: document.getElementById("examDate").value.trim(),
        photo: window.__photoDataUrl || "",
        overall: Number(document.getElementById("overall").value),
        speaking: Number(document.getElementById("speaking").value),
        writing: Number(document.getElementById("writing").value),
        reading: Number(document.getElementById("reading").value),
        listening: Number(document.getElementById("listening").value),
        production: Number(document.getElementById("production").value),
        literacy: Number(document.getElementById("literacy").value),
        comprehension: Number(document.getElementById("comprehension").value),
        conversation: Number(document.getElementById("conversation").value),
        certificateId: document.getElementById("certificateId").value.trim(),
        cefrLabel: document.getElementById("cefrLabel").value.trim() || "Proficient: CEFR C2",
      };
    }

    function fillForm(r) {
      document.getElementById("edit-id").value = r.id || "";
      document.getElementById("lastName").value = r.lastName || "";
      document.getElementById("firstName").value = r.firstName || "";
      document.getElementById("displayName").value = r.displayName || "";
      document.getElementById("dob").value = r.dob || "";
      document.getElementById("examDate").value = r.examDate || "";
      document.getElementById("overall").value = r.overall ?? 140;
      document.getElementById("cefrLabel").value = r.cefrLabel || "Proficient: CEFR C2";
      document.getElementById("speaking").value = r.speaking ?? "";
      document.getElementById("writing").value = r.writing ?? "";
      document.getElementById("reading").value = r.reading ?? "";
      document.getElementById("listening").value = r.listening ?? "";
      document.getElementById("production").value = r.production ?? "";
      document.getElementById("literacy").value = r.literacy ?? "";
      document.getElementById("comprehension").value = r.comprehension ?? "";
      document.getElementById("conversation").value = r.conversation ?? "";
      document.getElementById("certificateId").value = r.certificateId || "";
      window.__photoDataUrl = r.photo || "";
      var prev = document.getElementById("photo-preview");
      if (r.photo) {
        prev.src = r.photo;
        prev.style.display = "block";
      } else {
        prev.removeAttribute("src");
        prev.style.display = "none";
      }
      document.getElementById("form-title").textContent = r.id ? "Редактировать" : "Новый результат";
    }

    function clearForm() {
      document.getElementById("edit-id").value = "";
      document.getElementById("result-form").reset();
      document.getElementById("cefrLabel").value = "Proficient: CEFR C2";
      document.getElementById("overall").value = "140";
      window.__photoDataUrl = "";
      var prev = document.getElementById("photo-preview");
      prev.style.display = "none";
      prev.removeAttribute("src");
      document.getElementById("form-title").textContent = "Новый результат";
    }

    function renderList() {
      var list = document.getElementById("list");
      Promise.all([DET_store.list(), DET_store.exportJson()])
        .then(function (arr) {
          var items = arr[0];
          document.getElementById("export-data").value = arr[1];
          if (!items.length) {
            list.innerHTML = '<p class="empty">Пока нет записей — заполните форму слева.</p>';
            return;
          }
          list.innerHTML = items
            .map(function (r) {
              var name =
                r.displayName ||
                [r.lastName, r.firstName].filter(Boolean).join(", ") ||
                r.id;
              var uScore = pageUrl("score", r.id);
              var uCert = pageUrl("certificate", r.id);
              return (
                '<div class="result-item">' +
                "<strong>" +
                escapeHtml(name) +
                "</strong>" +
                '<span class="meta-id">id: ' +
                escapeHtml(r.id) +
                "</span>" +
                '<div class="links">Score: <a href="' +
                uScore +
                '">' +
                escapeHtml(uScore) +
                "</a><br/>Cert: <a href=\"" +
                uCert +
                '">' +
                escapeHtml(uCert) +
                "</a></div>" +
                '<button type="button" class="btn-secondary btn-small" data-edit="' +
                escapeAttr(r.id) +
                '">Редактировать</button> ' +
                '<button type="button" class="btn-danger btn-small" data-del="' +
                escapeAttr(r.id) +
                '">Удалить</button> ' +
                '<button type="button" class="btn-secondary btn-small" data-copy-s="' +
                escapeAttr(r.id) +
                '">Копировать score</button> ' +
                '<button type="button" class="btn-secondary btn-small" data-copy-c="' +
                escapeAttr(r.id) +
                '">Копировать cert</button>' +
                "</div>"
              );
            })
            .join("");

          list.querySelectorAll("[data-edit]").forEach(function (btn) {
            btn.addEventListener("click", function () {
              var id = btn.getAttribute("data-edit");
              DET_store.get(id).then(function (r) {
                fillForm(r);
              });
            });
          });
          list.querySelectorAll("[data-del]").forEach(function (btn) {
            btn.addEventListener("click", function () {
              if (!confirm("Удалить этот результат?")) return;
              DET_store.remove(btn.getAttribute("data-del")).then(function () {
                renderList();
                toast("Удалено");
              });
            });
          });
          list.querySelectorAll("[data-copy-s]").forEach(function (btn) {
            btn.addEventListener("click", function () {
              copyText(pageUrl("score", btn.getAttribute("data-copy-s")));
            });
          });
          list.querySelectorAll("[data-copy-c]").forEach(function (btn) {
            btn.addEventListener("click", function () {
              copyText(pageUrl("certificate", btn.getAttribute("data-copy-c")));
            });
          });
        })
        .catch(function (err) {
          list.innerHTML =
            '<p class="empty">Ошибка загрузки: ' + escapeHtml(String(err.message || err)) + "</p>";
        });
    }

    function escapeHtml(s) {
      var d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }
    function escapeAttr(s) {
      return s.replace(/"/g, "&quot;");
    }

    function copyText(text) {
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(
          function () {
            toast("Скопировано");
          },
          function () {
            prompt("Копировать:", text);
          }
        );
      } else {
        prompt("Копировать:", text);
      }
    }

    function initAdminUi() {
      DET_store.ready.then(function () {
        renderList();
      });

      document.getElementById("photo").addEventListener("change", function (e) {
        var f = e.target.files && e.target.files[0];
        if (!f) return;
        if (f.size > 2 * 1024 * 1024) {
          toast("Файл слишком большой (макс. ~2 МБ)");
          return;
        }
        var r = new FileReader();
        r.onload = function () {
          window.__photoDataUrl = r.result;
          var prev = document.getElementById("photo-preview");
          prev.src = r.result;
          prev.style.display = "block";
        };
        r.readAsDataURL(f);
      });

      document.getElementById("btn-random-id").addEventListener("click", function () {
        var chars = "abcdefghijklmnopqrstuvwxyz0123456789";
        var out = "";
        for (var i = 0; i < 16; i++) out += chars[Math.floor(Math.random() * chars.length)];
        document.getElementById("certificateId").value = out;
      });

      document.getElementById("result-form").addEventListener("submit", function (e) {
        e.preventDefault();
        var data = formToResult();
        DET_store.upsert(data).then(function (saved) {
          renderList();
          fillForm(saved);
          toast("Сохранено");
        });
      });

      document.getElementById("btn-new").addEventListener("click", clearForm);

      document.getElementById("btn-copy-json").addEventListener("click", function () {
        copyText(document.getElementById("export-data").value);
      });

      document.getElementById("btn-import").addEventListener("click", function () {
        DET_store
          .importJson(document.getElementById("import-field").value.trim())
          .then(function () {
            renderList();
            toast("Импорт выполнен");
          })
          .catch(function (err) {
            alert("Ошибка импорта: " + (err.message || err));
          });
      });
    }

    DET_adminAuth.mount({
      onGranted: function () {
        initAdminUi();
      },
    });
  </script>
</body>
</html>
