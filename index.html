<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DET Score Card</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <!--
    Duolingo: DIN Next Rounded + Feather Bold (лицензия). Без них — официальный substitute Nunito:
    https://design.duolingo.com/identity/typography (#substitute-font-nunito)
  -->
  <link
    href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&display=swap"
    rel="stylesheet"
  />
  <style>
    :root {
      --bg: #ececec;
      --surface: #ffffff;
      --border: #e0e0e0;
      --text: #4b4b4b;
      --muted: #afafaf;
      --blue: #1899d6;
      /* Кнопки как в продукте Duolingo (день) */
      --cta-sky: #1cb0f6;
      --cta-border: #e5e5e5;
      --cta-border-bottom: 5px;
      --green: #58cc02;
      --gauge-track: #e8e8e8;
      --score: 140;
      --min-score: 10;
      --max-score: 160;
      /*
        Середина между «слишком жирно» (800 / 875 / 900+) и «тонко» (600 / 680 / 780).
        Одинаковое число в font-weight и wght — иначе VF даёт рваную интерполяцию.
      */
      --fw-body: 450;
      --fw-soft: 700;
      --fw-ui: 775;
      --fw-emphasis: 875;
      /* длина зелёной дуги в единицах pathLength="1000" */
      --gauge-dash: calc((var(--score) - var(--min-score)) * 1000 / (var(--max-score) - var(--min-score)));
      /* Вертикальные «рейки» вокруг контента (мобильный вид) */
      --content-rail: rgba(0, 0, 0, 0.09);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html {
      height: 100%;
      overflow-x: clip;
    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      background: #ffffff;
      font-family: Nunito, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial,
        sans-serif;
      color: var(--text);
      font-weight: var(--fw-body);
      font-variation-settings: "wght" var(--fw-body);
      font-synthesis: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .shell {
      width: 100%;
      max-width: none;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      background: #ffffff;
      border: none;
      border-radius: 0;
      overflow-x: clip;
      overflow-y: visible;
      box-shadow: none;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: clamp(12px, 2vw, 18px) clamp(14px, 2.7vw, 24px);
      border-bottom: 1px solid rgba(0, 0, 0, 0.08);
      background: #ffffff;
      gap: 12px;
    }

    .menu,
    .cart {
      color: #a3a3a3;
      font-size: clamp(28px, 3.8vw, 34px);
      line-height: 1;
      width: clamp(36px, 5.2vw, 44px);
      height: clamp(36px, 5.2vw, 44px);
      text-align: center;
      user-select: none;
      display: grid;
      place-items: center;
      flex-shrink: 0;
    }

    .cart img {
      width: clamp(22px, 3vw, 26px);
      height: auto;
      display: block;
    }

    .brand {
      min-width: 0;
      flex: 1;
      display: grid;
      place-items: center;
    }

    .brand a {
      display: grid;
      place-items: center;
      text-decoration: none;
      color: inherit;
      outline: none;
    }

    .brand a:focus-visible {
      border-radius: 6px;
      box-shadow: 0 0 0 2px rgba(28, 176, 246, 0.5);
    }

    .brand img {
      width: min(100%, clamp(192px, 40vw, 270px));
      height: auto;
      display: block;
    }

    a.cart {
      text-decoration: none;
      color: inherit;
      outline: none;
    }

    a.cart:focus-visible {
      border-radius: 8px;
      box-shadow: 0 0 0 2px rgba(28, 176, 246, 0.5);
    }

    .content {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      /* Не width:100% + margin — иначе переполнение вправо и кривые рейки */
      box-sizing: border-box;
      min-width: 0;
      width: calc(
        100% - max(14px, env(safe-area-inset-left, 0px)) - max(14px, env(safe-area-inset-right, 0px))
      );
      max-width: min(1200px, 100%);
      margin-left: max(14px, env(safe-area-inset-left, 0px));
      margin-right: max(14px, env(safe-area-inset-right, 0px));
      min-height: 0;
      padding: clamp(18px, 4vw, 22px) clamp(16px, 4.5vw, 22px) clamp(20px, 4vh, 28px);
      padding-bottom: max(clamp(20px, 4vh, 28px), env(safe-area-inset-bottom, 0px));
      overflow-x: clip;
      overflow-y: visible;
      background: transparent;
      border-radius: 0;
      box-shadow: none;
      border-left: 1px solid var(--content-rail);
      border-right: 1px solid var(--content-rail);
    }

    /* Меньше «пружины» между hero и сабскорами */
    .page-spacer {
      flex: 0.28 1 auto;
      min-height: clamp(4px, 1.2vh, 14px);
    }

    .scores-panel {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: clamp(18px, 2.5vh, 26px);
      padding-top: 0;
      margin-top: clamp(16px, 2.8vh, 28px);
    }

    /* Мобильный hero: дата + заголовок слева, шкала справа (как в приложении) */
    .hero {
      width: 100%;
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(112px, 38vw);
      grid-template-rows: auto auto auto;
      column-gap: clamp(10px, 3vw, 18px);
      row-gap: clamp(6px, 1.2vw, 10px);
      align-items: start;
      margin-bottom: 0;
      padding-top: clamp(4px, 1vh, 12px);
      position: relative;
      isolation: isolate;
      overflow: visible;
      flex-shrink: 0;
    }

    .hero-left {
      display: contents;
    }

    .date {
      grid-column: 1;
      grid-row: 1;
      color: var(--muted);
      font-weight: var(--fw-soft);
      font-variation-settings: "wght" var(--fw-soft);
      font-size: clamp(13px, 3.4vw, 17px);
      letter-spacing: 0.02em;
      margin: 0;
    }

    .title {
      grid-column: 1;
      grid-row: 2;
      align-self: start;
      font-size: clamp(20px, 5.2vw, 28px);
      font-weight: var(--fw-emphasis);
      font-variation-settings: "wght" var(--fw-emphasis);
      display: flex;
      align-items: center;
      gap: clamp(6px, 1vw, 10px);
      flex-wrap: wrap;
      line-height: 1.2;
    }

    .check {
      background: var(--green);
      color: #fff;
      width: clamp(22px, 3vw, 28px);
      aspect-ratio: 1 / 1;
      border-radius: 50%;
      display: inline-grid;
      place-items: center;
      font-size: clamp(11px, 1.5vw, 14px);
      font-weight: var(--fw-ui);
      font-variation-settings: "wght" var(--fw-ui);
    }

    .cta-row {
      grid-column: 1 / -1;
      grid-row: 3;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: clamp(14px, 3.5vw, 22px);
      width: 100%;
      max-width: none;
    }

    .cta {
      appearance: none;
      -webkit-appearance: none;
      flex: 1;
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      margin: 0;
      border: solid var(--cta-border);
      border-width: 2px 2px var(--cta-border-bottom) 2px;
      border-radius: clamp(12px, 3.2vw, 16px);
      background: #ffffff;
      color: var(--cta-sky);
      font-family: inherit;
      font-size: clamp(12px, 1.65vw, 14px);
      font-weight: 800;
      font-variation-settings: "wght" 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: clamp(12px, 2vw, 14px) clamp(26px, 5vw, 38px);
      cursor: pointer;
      line-height: 1.2;
      text-decoration: none;
      transition:
        transform 0.12s ease,
        border-color 0.15s ease,
        background 0.15s ease,
        box-shadow 0.12s ease,
        border-width 0.12s ease;
    }

    .cta:hover {
      background: #ffffff;
      border-color: #dcdcdc;
      filter: brightness(0.99);
    }

    .cta:active {
      transform: translateY(3px);
      border-bottom-width: 2px;
    }

    .cta:focus {
      outline: none;
    }

    .cta:focus-visible {
      outline: 3px solid rgba(28, 176, 246, 0.45);
      outline-offset: 2px;
    }

    .gauge-wrap {
      grid-column: 2;
      grid-row: 1 / span 2;
      justify-self: end;
      align-self: start;
      flex-shrink: 0;
      width: 100%;
      max-width: min(200px, 44vw);
      margin: 0;
      text-align: center;
      position: relative;
      z-index: 4;
      overflow: visible;
    }

    /* Оболочка шкалы: балл внутри арки (оверлей), дуга > 180° */
    .gauge-stack {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      max-width: 100%;
      margin: 0;
      overflow: visible;
    }

    .gauge-face {
      position: relative;
      width: 100%;
      max-width: 100%;
      margin: 0 auto;
    }

    .gauge-svg {
      width: 100%;
      height: auto;
      display: block;
      overflow: visible;
    }

    .gauge-svg .gauge-cap-label {
      fill: #a8a8a8;
      font-family: Nunito, system-ui, -apple-system, sans-serif;
      font-weight: var(--fw-soft);
      font-variation-settings: "wght" var(--fw-soft);
      letter-spacing: 0.01em;
      /* font-size задаётся в user space (атрибут), чтобы масштаб совпадал с дугой */
    }

    /* Центр окружности дуги (120, 120) — цифра в той же системе координат, что и шкала */
    .gauge-svg .gauge-score-center {
      fill: var(--text);
      font-family: Nunito, system-ui, -apple-system, sans-serif;
      font-size: 54px;
      font-weight: var(--fw-emphasis);
      font-variation-settings: "wght" var(--fw-emphasis);
      letter-spacing: -0.03em;
      font-variant-numeric: tabular-nums;
    }

    .gauge-track {
      fill: none;
      stroke: var(--gauge-track);
      stroke-width: 14;
      stroke-linecap: round;
    }

    .gauge-fill {
      fill: none;
      stroke: var(--green);
      stroke-width: 14;
      stroke-linecap: round;
      stroke-dasharray: var(--gauge-dash) 1000;
    }

    .divider {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 0;
      width: 100%;
    }

    .section-title {
      margin: 0 0 clamp(12px, 2vw, 18px);
      font-size: clamp(16px, 2.4vw, 20px);
      font-weight: var(--fw-ui);
      font-variation-settings: "wght" var(--fw-ui);
      color: var(--text);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: clamp(18px, 4vw, 22px) clamp(12px, 3vw, 20px);
      justify-items: stretch;
    }

    .subscores-section + .subscores-section {
      margin-top: clamp(4px, 1vh, 10px);
    }

    .metric {
      text-align: left;
    }

    .metric .label {
      color: var(--muted);
      font-size: clamp(11px, 1.5vw, 13px);
      font-weight: var(--fw-ui);
      font-variation-settings: "wght" var(--fw-ui);
      text-transform: uppercase;
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .metric .value {
      font-size: clamp(26px, 4.2vw, 36px);
      line-height: 1;
      font-weight: var(--fw-emphasis);
      font-variation-settings: "wght" var(--fw-emphasis);
      color: var(--text);
      font-variant-numeric: tabular-nums;
    }

    /* Desktop: полная ширина страницы, без «карточки» */
    @media (min-width: 768px) {
      body {
        background: var(--surface);
      }

      .shell {
        background: var(--surface);
      }

      .content {
        width: 100%;
        max-width: min(100%, 1200px);
        margin-left: auto;
        margin-right: auto;
        padding: clamp(16px, 2.5vh, 28px) clamp(16px, 4vw, 40px) clamp(16px, 3vh, 36px);
        padding-bottom: max(clamp(16px, 3vh, 36px), env(safe-area-inset-bottom, 0px));
        background: transparent;
        border-radius: 0;
        box-shadow: none;
        border-left: none;
        border-right: none;
        overflow-x: visible;
      }

      .hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(220px, 280px);
        grid-template-rows: auto;
        align-items: start;
        column-gap: clamp(24px, 4vw, 48px);
        row-gap: 0;
        justify-content: space-between;
        padding-top: clamp(14px, 2.8vh, 28px);
      }

      .hero-left {
        display: flex;
        flex-direction: column;
        grid-column: 1;
        grid-row: 1;
        flex: 1;
        min-width: 0;
        align-items: flex-start;
        text-align: left;
        position: relative;
        z-index: 1;
      }

      .date {
        grid-column: unset;
        grid-row: unset;
        margin-bottom: clamp(6px, 1vw, 10px);
        font-size: clamp(14px, 2.2vw, 18px);
      }

      .title {
        grid-column: unset;
        grid-row: unset;
        font-size: clamp(22px, 3.8vw, 32px);
      }

      .gauge-wrap {
        grid-column: 2;
        grid-row: 1;
        width: 100%;
        max-width: 280px;
        justify-self: end;
        text-align: center;
      }

      .gauge-stack {
        max-width: 280px;
        margin-left: auto;
        margin-right: 0;
        align-items: center;
      }

      .gauge-face {
        max-width: 260px;
      }

      .cta-row {
        grid-column: unset;
        grid-row: unset;
        flex-direction: row;
        flex-wrap: nowrap;
        max-width: none;
        width: auto;
        align-self: start;
        margin-top: clamp(16px, 2.5vw, 24px);
      }

      .cta {
        min-width: clamp(168px, 22vw, 220px);
        flex: 1 1 auto;
        padding-left: clamp(22px, 2.8vw, 32px);
        padding-right: clamp(22px, 2.8vw, 32px);
      }

      .grid {
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: clamp(16px, 2.5vw, 24px) clamp(12px, 2vw, 20px);
        column-gap: clamp(16px, 3vw, 32px);
      }

      .subscores-section + .subscores-section {
        margin-top: 0;
      }
    }

    @media (max-height: 520px) {
      .page-spacer {
        flex-grow: 0;
        flex-basis: auto;
        min-height: 10px;
      }
    }

  </style>
</head>
